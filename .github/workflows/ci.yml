name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts
        run: |
          .\scripts\validate.ps1 examples/fullstack-saas
          .\scripts\stats.ps1 examples/fullstack-saas
      - name: Test CLI
        run: node bin/claude-cortex.js --help
